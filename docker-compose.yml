services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://blogger:blogger_password@postgres:5432/blogger_seo
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./images:/app/images
    restart: unless-stopped
    networks:
      - blogger-net

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["node", "dist/workers/index.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://blogger:blogger_password@postgres:5432/blogger_seo
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./images:/app/images
    restart: unless-stopped
    networks:
      - blogger-net

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["node", "dist/services/scheduler/index.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://blogger:blogger_password@postgres:5432/blogger_seo
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - blogger-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: blogger
      POSTGRES_PASSWORD: blogger_password
      POSTGRES_DB: blogger_seo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blogger -d blogger_seo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - blogger-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - blogger-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - blogger-net

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - blogger-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - blogger-net

volumes:
  postgres-data:
  redis-data:
  grafana-data:
  prometheus-data:

networks:
  blogger-net:
    driver: bridge
